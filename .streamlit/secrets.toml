# Supabase credentials (optional - for persistent subscription storage)
# Leave blank to use session-only authentication (free tier, no database needed)
# The platform works fully WITHOUT Supabase — subscriptions use session state only
SUPABASE_URL = ""
SUPABASE_ANON_KEY = ""

# Security salt — change this to a unique random string for your deployment
# This is used for HMAC token verification of subscription sessions
DSFLOW_SALT = "change_this_to_your_unique_random_string_2025"
